<!DOCTYPE html>
<html lang="en">

<title>PDF to Word Converter</title>

  body { font-family: Arial; text-align: center; padding: 50px; }
  input, button { padding: 10px; margin: 10px; }

<body>

<h1>PDF to Word Converter</h1>
<input type="file" id="pdfFile" accept=".pdf">

<button onclick="convertPDF()">Convert to Word</button>

    return;

  formData.append("file", fileInput.files[0]);
  formData.append("input_format", "pdf");
  formData.append("output_format", "docx");

      status.innerHTML = `Conversion complete! <a href="${downloadUrl}" target="_blank">Download Word file</a>`;
